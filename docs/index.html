<style>
/* Matchplan — styles */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg: hsl(215 30% 6%);
  --bg-elev: hsl(217 28% 9%);
  --bg-elev-2: hsl(217 24% 12%);
  --fg: hsl(220 20% 96%);
  --fg-muted: hsl(217 12% 60%);
  --fg-dim: hsl(217 10% 45%);
  --border: hsl(217 22% 16%);
  --border-strong: hsl(217 20% 24%);
  --primary: hsl(212 50% 48%);
  --accent: hsl(47 78% 56%);
  --accent-2: hsl(48 100% 65%);
  --green: hsl(142 60% 45%);
  --red: hsl(358 75% 59%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; min-height: 100vh; }
button, input, textarea { font: inherit; color: inherit; }
button { cursor: pointer; border: none; background: transparent; }
input, textarea { background: transparent; border: none; outline: none; }
textarea { resize: vertical; }

/* -------- Background -------- */
.app-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.app-bg::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(at 15% 10%, hsl(212 50% 48% / 0.22), transparent 50%),
    radial-gradient(at 85% 20%, hsl(47 78% 56% / 0.10), transparent 55%),
    radial-gradient(at 50% 90%, hsl(217 30% 12% / 0.6), transparent 60%);
  filter: blur(30px);
}

/* -------- Top bar -------- */
.topbar { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(20px); background: hsl(215 30% 6% / 0.75); border-bottom: 1px solid var(--border); }
.topbar-inner { max-width: 1400px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; gap: 24px; }
.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-badge { width: 32px; height: 32px; border-radius: 6px; background: var(--bg-elev); border: 1px solid var(--border); color: var(--accent); display: grid; place-items: center; font-family: ui-monospace, Menlo, monospace; font-weight: 900; font-size: 14px; }
.brand-name { font-weight: 800; letter-spacing: -0.02em; font-size: 14px; }
.brand-name .yr { color: var(--accent); margin-left: 4px; }

.match-meta { display: flex; align-items: center; gap: 18px; flex: 1; }
.match-meta .vs { font-size: 11px; font-weight: 700; color: var(--fg-muted); letter-spacing: 0.2em; text-transform: uppercase; }
.match-meta h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; }
.match-meta h1 .opp { color: var(--accent); }
.match-meta .dots { display: flex; gap: 14px; font-size: 12px; color: var(--fg-muted); }
.match-meta .dots span::before { content: "·"; margin-right: 14px; color: var(--fg-dim); }
.match-meta .dots span:first-child::before { content: none; }

.variant-toggle { display: flex; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; }
.variant-toggle button { padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--fg-muted); border-radius: 6px; transition: all .2s; }
.variant-toggle button.is-active { background: var(--bg-elev-2); color: var(--fg); box-shadow: 0 1px 0 hsl(0 0% 100% / 0.04) inset; }
.variant-toggle button:hover:not(.is-active) { color: var(--fg); }

/* -------- Eyebrow -------- */
.eyebrow { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.28em; text-transform: uppercase; }
.eyebrow-mono { font-family: ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; }
.section-num { font-family: ui-monospace, Menlo, monospace; font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; }
.section-h { font-size: 28px; font-weight: 900; letter-spacing: -0.025em; line-height: 1.1; }

/* -------- Cards -------- */
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; }
.card-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 12px; }
.card-head .lbl { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
.card-head .num { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.1em; }
.card-body { padding: 18px 20px; }

/* -------- Editable field -------- */
.ed, .ed-ta { display: block; width: 100%; padding: 6px 8px; border-radius: 6px; background: transparent; border: 1px dashed transparent; transition: all .15s; font-size: 13px; line-height: 1.55; color: var(--fg); }
.ed:hover, .ed-ta:hover { border-color: var(--border-strong); background: hsl(0 0% 100% / 0.015); }
.ed:focus, .ed-ta:focus { border-color: var(--accent); border-style: solid; background: hsl(0 0% 100% / 0.03); }
.ed-ta { min-height: 48px; resize: vertical; }
.ed-small { font-size: 12px; padding: 4px 6px; }

/* -------- Layout wrappers -------- */
.page { max-width: 1400px; margin: 0 auto; padding: 32px 28px 80px; }

/* Variant A — Koherens-flöde (single column story) */
.flow { display: grid; grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr); gap: 28px; align-items: start; }
.flow-main { display: flex; flex-direction: column; gap: 24px; }
.flow-side { position: sticky; top: 100px; display: flex; flex-direction: column; gap: 20px; }
.section-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; position: relative; overflow: hidden; }
.section-card::before { content: ""; position: absolute; top: 28px; bottom: 28px; left: 0; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
.section-card .sec-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
.section-card .sec-sub { color: var(--fg-muted); font-size: 13px; margin-top: 10px; font-style: italic; }
.section-card .sec-body { margin-top: 18px; }

.principles-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 14px 0; }
.principle-chip { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); background: hsl(47 78% 56% / 0.08); border: 1px solid hsl(47 78% 56% / 0.35); padding: 5px 10px; border-radius: 999px; white-space: nowrap; }

.sec-note { margin-top: 6px; font-size: 13px; color: var(--fg-dim); font-style: italic; line-height: 1.5; }

.bullets { display: flex; flex-direction: column; gap: 6px; }
.bullet-row { display: grid; grid-template-columns: 22px 1fr auto; align-items: start; gap: 10px; padding: 4px 2px; }
.bullet-row .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-top: 9px; }
.bullet-row .x { font-size: 14px; color: var(--fg-dim); padding: 4px 6px; border-radius: 4px; opacity: 0; }
.bullet-row:hover .x { opacity: 1; }
.bullet-row .x:hover { color: var(--red); background: hsl(0 0% 100% / 0.04); }
.add-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; font-size: 12px; color: var(--fg-muted); cursor: pointer; padding: 6px 2px; }
.add-row:hover { color: var(--accent); }
.add-row .plus { width: 18px; height: 18px; border-radius: 50%; border: 1px dashed var(--border-strong); display: grid; place-items: center; font-size: 14px; line-height: 1; }
.add-row:hover .plus { border-color: var(--accent); }

.fallback-box { margin-top: 18px; padding: 14px 16px; background: hsl(358 60% 12%); border: 1px solid hsl(358 60% 22%); border-radius: 10px; }
.fallback-box .lbl { font-size: 10px; color: hsl(358 75% 72%); font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px; }

.five-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 4px; }
@media (max-width: 900px) { .five-grid { grid-template-columns: repeat(2, 1fr); } }
.five-cell { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.five-cell .k { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; }
.five-cell .v { font-size: 12px; color: var(--fg); line-height: 1.45; }

.role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.role-row { display: grid; grid-template-columns: 140px 1fr; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 8px; }
.role-row .k { font-size: 11px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.1em; }

/* -------- Pitch / formation -------- */
.pitch { position: relative; aspect-ratio: 68 / 105; background:
  linear-gradient(to bottom, hsl(142 35% 20%), hsl(142 35% 16%));
  border: 2px solid hsl(0 0% 100% / 0.5); border-radius: 8px; overflow: hidden;
  background-image:
    repeating-linear-gradient(to bottom, transparent 0 10%, hsl(0 0% 100% / 0.03) 10% 20%),
    linear-gradient(to bottom, hsl(142 35% 20%), hsl(142 35% 16%));
}
.pitch .line { position: absolute; background: hsl(0 0% 100% / 0.5); }
.pitch .halfway { left: 0; right: 0; top: 50%; height: 2px; }
.pitch .circle { left: 50%; top: 50%; width: 25%; aspect-ratio: 1; border: 2px solid hsl(0 0% 100% / 0.5); border-radius: 50%; transform: translate(-50%, -50%); position: absolute; }
.pitch .box-top { left: 22%; right: 22%; top: 0; height: 14%; border: 2px solid hsl(0 0% 100% / 0.5); border-top: none; position: absolute; }
.pitch .box-bot { left: 22%; right: 22%; bottom: 0; height: 14%; border: 2px solid hsl(0 0% 100% / 0.5); border-bottom: none; position: absolute; }
.pitch .gold-zone { position: absolute; top: 0; left: 28%; right: 28%; height: 22%; background: hsl(47 78% 56% / 0.12); border: 1px dashed hsl(47 78% 56% / 0.4); }

.slot { position: absolute; transform: translate(-50%, -50%); width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center; cursor: pointer; transition: all .2s; }
.slot .num { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: var(--bg); font-weight: 900; font-size: 15px; display: grid; place-items: center; border: 2px solid hsl(48 100% 72%); box-shadow: 0 4px 12px hsl(0 0% 0% / 0.4); transition: all .2s; }
.slot.empty .num { background: hsl(0 0% 100% / 0.08); color: var(--fg-muted); border-color: var(--border-strong); font-size: 11px; font-weight: 700; }
.slot.is-drag-over .num { transform: scale(1.2); background: var(--accent-2); }
.slot .lbl { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); background: var(--bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; color: var(--fg-muted); white-space: nowrap; letter-spacing: 0.06em; }
.slot .name { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--fg); white-space: nowrap; font-weight: 600; background: hsl(0 0% 0% / 0.6); padding: 1px 5px; border-radius: 3px; }
.slot:hover .num { transform: scale(1.08); }

/* -------- Roster -------- */
.roster { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; }
.rchip { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 8px; cursor: grab; transition: all .15s; user-select: none; }
.rchip:hover { border-color: var(--accent); }
.rchip:active { cursor: grabbing; }
.rchip.is-used { opacity: 0.35; }
.rchip .n { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: var(--bg); font-weight: 800; font-size: 11px; display: grid; place-items: center; flex-shrink: 0; }
.rchip.is-used .n { background: var(--fg-dim); }
.rchip .nm { font-size: 11px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rchip .rl { font-size: 9px; color: var(--fg-muted); font-weight: 700; letter-spacing: 0.08em; }

.roster-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.roster-head h3 { font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg); }
.roster-head .hint { font-size: 10px; color: var(--fg-muted); }

/* -------- Variant B: Dense grid -------- */
.grid-b { display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 16px; }
.grid-b .col { display: flex; flex-direction: column; gap: 16px; }
.grid-b .card-head { padding: 12px 16px; }
.grid-b .card-body { padding: 14px 16px; }
.grid-b .card-head .lbl { font-size: 13px; }
.grid-b .bullets { gap: 4px; }
.grid-b .bullet-row { font-size: 12px; }
.grid-b .ed, .grid-b .ed-ta { font-size: 12px; padding: 4px 6px; }
@media (max-width: 1100px) { .grid-b { grid-template-columns: 1fr; } }

.stacklist { display: flex; flex-direction: column; gap: 6px; }
.stacklist .item { display: grid; grid-template-columns: auto 1fr; gap: 10px; padding: 8px 10px; background: var(--bg-elev-2); border-left: 2px solid var(--accent); border-radius: 0 6px 6px 0; font-size: 12px; }
.stacklist .item .k { font-weight: 800; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
.stacklist .item .v { color: var(--fg); line-height: 1.45; }

/* -------- Tactic board (simple drag pucks) -------- */
.board { position: relative; background: hsl(142 40% 22%); border: 2px solid hsl(0 0% 100% / 0.5); border-radius: 8px; aspect-ratio: 16 / 10; overflow: hidden;
  background-image: repeating-linear-gradient(to right, hsl(142 40% 22%) 0 10%, hsl(142 40% 19%) 10% 20%);
}
.board .bline { position: absolute; background: hsl(0 0% 100% / 0.45); }
.board .bmid { left: 50%; top: 0; bottom: 0; width: 2px; }
.board .bcircle { left: 50%; top: 50%; width: 15%; aspect-ratio: 1; border: 2px solid hsl(0 0% 100% / 0.45); border-radius: 50%; transform: translate(-50%, -50%); position: absolute; }
.board .bbox-l, .board .bbox-r { position: absolute; top: 50%; transform: translateY(-50%); width: 14%; height: 50%; border: 2px solid hsl(0 0% 100% / 0.45); }
.board .bbox-l { left: 0; border-left: none; }
.board .bbox-r { right: 0; border-right: none; }
.puck { position: absolute; transform: translate(-50%, -50%); width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 12px; color: white; cursor: grab; user-select: none; box-shadow: 0 3px 8px hsl(0 0% 0% / 0.5); border: 2px solid hsl(0 0% 100% / 0.4); }
.puck.us { background: hsl(47 78% 56%); color: hsl(215 30% 6%); border-color: hsl(48 100% 72%); }
.puck.them { background: hsl(212 60% 48%); }
.puck.ball { background: white; color: black; width: 18px; height: 18px; font-size: 11px; border-color: hsl(0 0% 90%); }
.puck:active { cursor: grabbing; }
.board-tools { display: flex; gap: 8px; margin-top: 10px; font-size: 11px; color: var(--fg-muted); }
.board-tools button { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-elev-2); color: var(--fg); font-size: 11px; font-weight: 600; }
.board-tools button:hover { border-color: var(--accent); color: var(--accent); }

/* -------- Press trigger rows -------- */
.trigger { display: grid; grid-template-columns: 1fr; gap: 4px; padding: 12px 14px; background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
.trigger .t { font-size: 12px; font-weight: 700; color: var(--accent); display: flex; gap: 8px; align-items: baseline; }
.trigger .t::before { content: "▸"; font-size: 11px; }
.trigger .a { font-size: 12px; color: var(--fg); padding-left: 18px; line-height: 1.5; }

/* utils */
.muted { color: var(--fg-muted); }
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 12px; background: var(--bg-elev-2); border: 1px solid var(--border); font-size: 10px; font-weight: 700; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; }
.pill.gold { color: var(--accent); border-color: hsl(47 78% 56% / 0.3); }

.hint-inline { font-size: 11px; color: var(--fg-dim); margin-top: 6px; }

/* Drag feedback */
.rchip[draggable="true"] { touch-action: none; }

/* ---------- Taktiska situationer ---------- */
.sit-thumbs {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-top: 14px;
}
.sit-thumb {
  all: unset;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 6px;
  width: 140px;
  padding: 6px;
  border: 1px solid hsl(0 0% 100% / 0.08);
  border-radius: 8px;
  background: hsl(0 0% 100% / 0.02);
  transition: border-color 0.15s, transform 0.15s;
  box-sizing: border-box;
}
.sit-thumb:hover {
  border-color: hsl(47 78% 56% / 0.6);
  transform: translateY(-1px);
}
.sit-thumb-svg {
  aspect-ratio: 1 / 1;
  border-radius: 4px;
  overflow: hidden;
  background: #0b1220;
}
.sit-thumb-title {
  font-size: 11px;
  color: var(--fg-dim);
  line-height: 1.3;
  text-align: center;
}
.sit-svg { display: block; width: 100%; height: 100%; }

.sit-lightbox {
  position: fixed; inset: 0;
  background: rgba(8, 12, 22, 0.85);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.sit-lightbox-inner {
  position: relative;
  background: #0b1220;
  border: 1px solid hsl(47 78% 56% / 0.25);
  border-radius: 12px;
  padding: 24px 28px 20px;
  max-width: min(92vw, 900px);
  width: 100%;
  max-height: 92vh;
  overflow: auto;
  box-sizing: border-box;
}
.sit-lightbox-close {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: var(--fg-dim);
  font-size: 28px; line-height: 1; cursor: pointer;
}
.sit-lightbox-close:hover { color: var(--accent); }
.sit-lightbox-title {
  font-size: 18px; font-weight: 800; color: var(--fg);
  margin-bottom: 4px;
}
.sit-lightbox-sub {
  font-size: 13px; color: var(--fg-dim);
  margin-bottom: 14px;
}
.sit-lightbox-svg {
  aspect-ratio: 1 / 1;
  max-width: 640px;
  margin: 0 auto;
  border-radius: 6px;
  overflow: hidden;
}

.sit-bench {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 14px;
  justify-content: center;
}
.sit-bench-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: hsl(211 78% 47% / 0.18);
  border: 1px solid hsl(211 78% 47% / 0.5);
  border-radius: 999px;
  font-size: 12px;
}
.sit-bench-pill .n { color: #4aa3ff; font-weight: 800; }
.sit-bench-pill .nm { color: var(--fg); }

/* ---------- Taktiktavla (V1) ---------- */
.tb-preview {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.tb-preview-hint {
  font-size: 11px;
  color: var(--fg-dim);
  line-height: 1.4;
}
.tb-preview-btn {
  background: var(--accent);
  color: #111;
  font-weight: 800;
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 0.04em;
}
.tb-preview-btn:hover {
  background: var(--accent-2);
}
.tb-lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.tb-lightbox-inner {
  background: #0b1220;
  border: 2px solid var(--accent);
  border-radius: 12px;
  max-width: 1200px;
  width: 100%;
  max-height: 95vh;
  padding: 20px;
  overflow: auto;
  position: relative;
}
.tb-lightbox-close {
  position: absolute;
  top: 12px;
  right: 14px;
  background: transparent;
  border: 1px solid hsl(0 0% 100% / 0.25);
  color: #fff;
  font-size: 20px;
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  line-height: 1;
}
.tb-lightbox-close:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.tb-lightbox-title {
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 14px;
  padding-right: 44px;
}
.tb-svg {
  width: 100%;
  height: auto;
  display: block;
  touch-action: none;

<script>
// Planens geometri — sanningen för var linjer, boxar och zoner ligger.
// Källa: FIFA-mått 105 × 68 meter. Alla koordinater i meter.
//
// x = 0 (vår mållinje) → 105 (motståndarmål).
// y = 0 (vänster sidolinje) → 68 (höger sidolinje).
//
// Vi renderar i två vyer:
//  - full: liggande helplan, SVG-viewBox 1050 × 680 (1 m = 10 SVG-enheter)
//  - half: stående motståndarhalva, SVG-viewBox 680 × 525

window.MP_PITCH = {
  length: 105,
  width: 68,
  centerY: 34,
  paDepth: 16.5,
  paHalfWidth: 20.16,
  paNear: 13.84,   // 34 - 20.16
  paFar: 54.16,    // 34 + 20.16
  gaDepth: 5.5,
  gaHalfWidth: 9.16,
  gaNear: 24.84,
  gaFar: 43.16,
  goalHalfWidth: 3.66,
  goalNear: 30.34,
  goalFar: 37.66,
  penaltyDistance: 11,
  centerCircleRadius: 9.15,
};

window.MP_CORRIDORS = {
  leftOuter:  { yMin: 0,     yMax: 13.84 },
  leftInner:  { yMin: 13.84, yMax: 24.84 },
  central:    { yMin: 24.84, yMax: 43.16 },
  rightInner: { yMin: 43.16, yMax: 54.16 },
  rightOuter: { yMin: 54.16, yMax: 68   },
};

window.MP_GOLDEN_ZONE  = { xMin: 88.5, xMax: 99.5, yMin: 24.84, yMax: 43.16 };
window.MP_LEFT_ASSIST  = { xMin: 84.5, xMax: 105,  yMin: 13.84, yMax: 24.84 };
window.MP_RIGHT_ASSIST = { xMin: 84.5, xMax: 105,  yMin: 43.16, yMax: 54.16 };
window.MP_FRONT_ASSIST = { xMin: 84.5, xMax: 88.5, yMin: 13.84, yMax: 54.16 };

window.MP_THIRDS = {
  first:  { xMin: 0,  xMax: 35  },
  middle: { xMin: 35, xMax: 70  },
  final:  { xMin: 70, xMax: 105 },
};

window.MP_FULL_VB = { width: 1050, height: 680, scale: 10 };
window.MP_HALF_VB = { width: 680,  height: 525, scale: 10 };

// Liggande helplan: meter (x,y) → SVG-koord
window.fullM = function (xM, yM) {
  return { x: xM * window.MP_FULL_VB.scale, y: yM * window.MP_FULL_VB.scale };
};

// Stående halvplan, motståndarens halva (x = 52.5..105 m).
// x=105 (motståndarmål) → svg-y=0 (topp).
// x=52.5 (mittlinjen) → svg-y=525 (botten).
// y=0 → svg-x=0. y=68 → svg-x=680.
window.halfM = function (xM, yM) {
  return {
    x: yM * window.MP_HALF_VB.scale,
    y: (105 - xM) * window.MP_HALF_VB.scale,
  };
};

// Meter → procent (kompatibilitet med PlayerDot, behövs inte i V1 men ligger kvar för framtida behov)
window.metersToHalfPitchPct = function (xM, yM) {
  return {
    x: (yM / 68) * 100,
    y: (xM / 105) * 100,
  };
};

<div id="root"></div>
<script type="text/babel" data-presets="react">
// Matchplan — React components
const { useState, useRef, useEffect } = React;

/* ---------- Shared helpers ---------- */
function Eyebrow({ children, mono }) {
  return <div className={mono ? "eyebrow-mono" : "eyebrow"}>{children}</div>;
}

function EditableLine({ value, onChange, placeholder, small }) {
  return (
    <input
      className={"ed " + (small ? "ed-small" : "")}
      value={value}
      placeholder={placeholder}
      onChange={e => onChange(e.target.value)}
    />
  );
}

function EditableText({ value, onChange, placeholder }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.style.height = "auto";
    ref.current.style.height = ref.current.scrollHeight + "px";
  }, [value]);
  return (
    <textarea
      ref={ref}
      className="ed-ta"
      value={value}
      placeholder={placeholder}
      onChange={e => onChange(e.target.value)}
    />
  );
}

/* ---------- Principles (read-only pill chips) ---------- */
function Principles({ items }) {
  if (!items || !items.length) return null;
  return (
    <div className="principles-row">
      {items.map((p, i) => (
        <span key={i} className="principle-chip">{p}</span>
      ))}
    </div>
  );
}

/* ---------- Bullets list ---------- */
function Bullets({ items, onChange }) {
  const add = () => onChange([...items, ""]);
  const edit = (i, v) => onChange(items.map((it, idx) => idx === i ? v : it));
  const remove = (i) => onChange(items.filter((_, idx) => idx !== i));
  return (
    <div className="bullets">
      {items.map((it, i) => (
        <div key={i} className="bullet-row">
          <div className="dot" />
          <EditableText value={it} onChange={v => edit(i, v)} placeholder="Lägg till rad..." />
          <button className="x" onClick={() => remove(i)} title="Ta bort">✕</button>
        </div>
      ))}
      <div className="add-row" onClick={add}>
        <span className="plus">+</span> Lägg till rad
      </div>
    </div>
  );
}

/* ---------- Pitch with drag-drop slots ---------- */
function Pitch({ assignments, onAssign, onClear, roster }) {
  const [dragOver, setDragOver] = useState(null);
  return (
    <div className="pitch">
      <div className="gold-zone" />
      <div className="line halfway" />
      <div className="circle" />
      <div className="box-top" />
      <div className="box-bot" />
      {MP_DATA.formation433.positions.map(pos => {
        const num = assignments[pos.id];
        const player = roster.find(p => p.n === num);
        const isOver = dragOver === pos.id;
        const empty = !num;
        return (
          <div
            key={pos.id}
            className={"slot " + (empty ? "empty " : "") + (isOver ? "is-drag-over" : "")}
            style={{ left: `${pos.x}%`, top: `${100 - pos.y}%` }}
            onDragOver={e => { e.preventDefault(); setDragOver(pos.id); }}
            onDragLeave={() => setDragOver(null)}
            onDrop={e => {
              e.preventDefault();
              const n = parseInt(e.dataTransfer.getData("text/plain"), 10);
              if (!isNaN(n)) onAssign(pos.id, n);
              setDragOver(null);
            }}
            onClick={() => { if (num) onClear(pos.id); }}
            title={player ? `Klicka för att ta bort ${player.name}` : "Dra spelare hit"}
          >
            <div className="num">{num || pos.label}</div>
            <div className="lbl">{pos.label}</div>
            {player && <div className="name">{player.name}</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- Roster (draggable chips) ---------- */
function Roster({ roster, setRoster, used }) {
  return (
    <div>
      <div className="roster-head">
        <h3>Trupp (16)</h3>
        <span className="hint">Dra till planen →</span>
      </div>
      <div className="roster">
        {roster.map((p, i) => (
          <div
            key={p.n}
            className={"rchip " + (used.has(p.n) ? "is-used" : "")}
            draggable
            onDragStart={e => e.dataTransfer.setData("text/plain", String(p.n))}
          >
            <div className="n">{p.n}</div>
            <input
              className="nm"
              value={p.name}
              onChange={e => setRoster(roster.map((x, idx) => idx === i ? { ...x, name: e.target.value } : x))}
            />
            <div className="rl">{p.role}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Tactic board preview (card) ---------- */
function TacticBoard({ onOpen }) {
  return (
    <div className="tb-preview">
      <div className="tb-preview-hint">Öppna fullscreen-taktiktavlan för att dra spelare och rita pilar.</div>
      <button className="tb-preview-btn" onClick={onOpen} type="button">
        Öppna taktiktavla
      </button>
    </div>
  );
}

/* ---------- Tactic board helpers ---------- */
function toTacticSvgY(dataY) {
  // MP_DATA har "0 = vår MV", vi vill ha "0 = motståndarmål (uppe i SVG)"
  return 100 - dataY;
}

function getPlayerInitials(name) {
  if (!name) return "";
  const parts = name.trim().split(/\s+/);
  const first = parts[0] ? parts[0][0].toUpperCase() : "";
  const second = parts[1] ? parts[1][0].toUpperCase() : "";
  return first + second;
}

const TACTIC_BENCH_SLOTS_X = [22, 32, 42, 52, 62, 72, 82];
const TACTIC_BENCH_Y = 110;

function buildTacticPlayers(roster, assignments) {
  const positions = MP_DATA.formation433.positions;
  const usedNumbers = new Set();
  const onField = [];

  // 1) Fyll tilldelade positioner från assignments
  positions.forEach(pos => {
    const num = assignments[pos.id];
    if (num != null) {
      const p = roster.find(r => r.n === num);
      if (p) {
        onField.push({
          n: p.n,
          name: p.name,
          initials: getPlayerInitials(p.name),
          x: pos.x,
          y: toTacticSvgY(pos.y),
          onField: true,
        });
        usedNumbers.add(p.n);
      }
    }
  });

  // 2) Fyll luckor i positions-ordning med nästa oanvända roster-spelare
  positions.forEach(pos => {
    if (assignments[pos.id] != null) return; // redan fylld
    const nextPlayer = roster.find(r => !usedNumbers.has(r.n));
    if (!nextPlayer) return;
    onField.push({
      n: nextPlayer.n,
      name: nextPlayer.name,
      initials: getPlayerInitials(nextPlayer.name),
      x: pos.x,
      y: toTacticSvgY(pos.y),
      onField: true,
    });
    usedNumbers.add(nextPlayer.n);
  });

  // 3) Återstående roster-spelare hamnar på bänk
  const bench = [];
  roster.forEach(r => {
    if (usedNumbers.has(r.n)) return;
    const slotIndex = bench.length;
    const x = TACTIC_BENCH_SLOTS_X[slotIndex] ?? (TACTIC_BENCH_SLOTS_X[TACTIC_BENCH_SLOTS_X.length - 1] + (slotIndex - TACTIC_BENCH_SLOTS_X.length + 1) * 5);
    bench.push({
      n: r.n,
      name: r.name,
      initials: getPlayerInitials(r.name),
      x,
      y: TACTIC_BENCH_Y,
      onField: false,
    });
  });

  return [...onField, ...bench];
}

/* ---------- Tactic board lightbox (fullscreen) ---------- */
function TacticBoardLightbox({ open, onClose, roster, assignments }) {
  const [players, setPlayers] = useState([]);
  const [arrows, setArrows] = useState([]);
  const [toolMode, setToolMode] = useState("move");
  const [arrowPreview, setArrowPreview] = useState(null); // { x1, y1, x2, y2 }
  const svgRef = useRef(null);
  const dragRef = useRef(null);
  const arrowRef = useRef(null); // { x1, y1 }

  useEffect(() => {
    if (!open) return;
    setPlayers(buildTacticPlayers(roster, assignments));
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose, roster, assignments]);

  function screenToSvg(clientX, clientY) {
    const svg = svgRef.current;
    if (!svg) return { x: 0, y: 0 };
    const ctm = svg.getScreenCTM();
    if (ctm) {
      const pt = svg.createSVGPoint();
      pt.x = clientX; pt.y = clientY;
      const inv = ctm.inverse();
      const local = pt.matrixTransform(inv);
      return { x: local.x, y: local.y };
    }
    const rect = svg.getBoundingClientRect();
    return {
      x: ((clientX - rect.left) / rect.width) * 100,
      y: ((clientY - rect.top) / rect.height) * 118,
    };
  }

  function resetPlayers() {
    setPlayers(buildTacticPlayers(roster, assignments));
  }

  function onPuckPointerDown(e, n) {
    if (toolMode !== "move") return;
    e.stopPropagation();
    const svgPt = screenToSvg(e.clientX, e.clientY);
    const player = players.find(p => p.n === n);
    if (!player) return;
    dragRef.current = { n, dx: svgPt.x - player.x, dy: svgPt.y - player.y };
    e.target.setPointerCapture(e.pointerId);
  }

  function onPuckPointerMove(e) {
    if (!dragRef.current) return;
    const svgPt = screenToSvg(e.clientX, e.clientY);
    const { n, dx, dy } = dragRef.current;
    let nextX = Math.max(2, Math.min(98, svgPt.x - dx));
    let nextY = Math.max(2, Math.min(116, svgPt.y - dy));
    setPlayers(ps => ps.map(p => p.n === n ? { ...p, x: nextX, y: nextY } : p));
  }

  function onPuckPointerUp(e) {
    if (!dragRef.current) return;
    const { n } = dragRef.current;
    dragRef.current = null;
    try { e.target.releasePointerCapture(e.pointerId); } catch (_) {}
    setPlayers(ps => ps.map(p => {
      if (p.n !== n) return p;
      return { ...p, onField: p.y <= 100 };
    }));
  }

  function onSvgPointerDown(e) {
    if (toolMode !== "arrow") return;
    const svgPt = screenToSvg(e.clientX, e.clientY);
    if (svgPt.y > 100) return; // inga pilar i bänk-bandet
    arrowRef.current = { x1: svgPt.x, y1: svgPt.y };
    setArrowPreview({ x1: svgPt.x, y1: svgPt.y, x2: svgPt.x, y2: svgPt.y });
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function onSvgPointerMove(e) {
    if (!arrowRef.current) return;
    const svgPt = screenToSvg(e.clientX, e.clientY);
    const x2 = Math.max(2, Math.min(98, svgPt.x));
    const y2 = Math.max(2, Math.min(98, svgPt.y));
    setArrowPreview({ x1: arrowRef.current.x1, y1: arrowRef.current.y1, x2, y2 });
  }

  function onSvgPointerUp(e) {
    if (!arrowRef.current) return;
    const start = arrowRef.current;
    arrowRef.current = null;
    try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (_) {}
    // Läs aktuell pointer-position direkt från eventet — undviker stale closure
    const svgPt = screenToSvg(e.clientX, e.clientY);
    const x2 = Math.max(2, Math.min(98, svgPt.x));
    const y2 = Math.max(2, Math.min(98, svgPt.y));
    const len = Math.hypot(x2 - start.x1, y2 - start.y1);
    if (len >= 2) {
      setArrows(as => [...as, { x1: start.x1, y1: start.y1, x2, y2 }]);
    }
    setArrowPreview(null);
  }

  if (!open) return null;

  return (
    <div className="tb-lightbox" onClick={onClose}>
      <div className="tb-lightbox-inner" onClick={e => e.stopPropagation()}>
        <button className="tb-lightbox-close" onClick={onClose} aria-label="Stäng" type="button">×</button>
        <div className="tb-lightbox-title">Taktiktavla — 4-3-3</div>
        <div className="tb-toolbar">
          <button className="tb-tool-btn" onClick={resetPlayers} type="button">
            Återställ
          </button>
          <button
            className={"tb-tool-btn " + (toolMode === "arrow" ? "is-active" : "")}
            onClick={() => setToolMode(toolMode === "arrow" ? "move" : "arrow")}
            type="button"
          >
            Rita pil
          </button>
          <button
            className="tb-tool-btn"
            onClick={() => setArrows([])}
            type="button"
          >
            Rensa pilar
          </button>
        </div>
        <svg
          ref={svgRef}
          className={"tb-svg " + (toolMode === "arrow" ? "is-arrow-mode" : "")}
          viewBox="0 0 100 118"
          preserveAspectRatio="xMidYMid meet"
          xmlns="http://www.w3.org/2000/svg"
          onPointerDown={onSvgPointerDown}
          onPointerMove={onSvgPointerMove}
          onPointerUp={onSvgPointerUp}
          onPointerCancel={onSvgPointerUp}
        >
          <defs>
            <pattern id="tb-grass" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#266b2a" />
              <rect x="5" width="5" height="10" fill="#215e24" />
            </pattern>
            <marker id="tb-arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto">
              <path d="M0,0 L10,5 L0,10 z" fill="#eac54f" />
            </marker>
          </defs>
          <rect x="0" y="0" width="100" height="100" fill="url(#tb-grass)" />
          <rect x="1" y="1" width="98" height="98" fill="none" stroke="#ffffffa0" strokeWidth="0.4" />
          <line x1="1" y1="50" x2="99" y2="50" stroke="#ffffffa0" strokeWidth="0.3" />
          <circle cx="50" cy="50" r="8" fill="none" stroke="#ffffffa0" strokeWidth="0.3" />
          <rect x="25" y="1" width="50" height="14" fill="none" stroke="#ffffff80" strokeWidth="0.3" />
          <rect x="25" y="85" width="50" height="14" fill="none" stroke="#ffffff80" strokeWidth="0.3" />
          <rect x="0" y="100" width="100" height="18" fill="#0b1220" />
          <line x1="0" y1="100" x2="100" y2="100" stroke="#eac54f" strokeWidth="0.3" />
          <text x="3" y="106" fontSize="2.4" fontWeight="700" fill="#eac54f" fontFamily="system-ui" letterSpacing="0.4">BÄNK</text>
          {arrows.map((a, i) => (
            <line
              key={"arrow-" + i}
              className="tb-arrow"
              x1={a.x1} y1={a.y1} x2={a.x2} y2={a.y2}
              stroke="#eac54f"
              strokeWidth="0.8"
              strokeLinecap="round"
              markerEnd="url(#tb-arrowhead)"
            />
          ))}
          {arrowPreview && (
            <line
              className="tb-arrow-preview"
              x1={arrowPreview.x1} y1={arrowPreview.y1}
              x2={arrowPreview.x2} y2={arrowPreview.y2}
              stroke="#eac54f"
              strokeWidth="0.6"
              strokeLinecap="round"
              markerEnd="url(#tb-arrowhead)"
              opacity="0.6"
            />
          )}
          {players.map(p => (
            <g
              key={p.n}
              className="tb-puck"
              data-n={p.n}
              onPointerDown={e => onPuckPointerDown(e, p.n)}

                cx={p.x}
                cy={p.y}

                stroke={p.onField ? "#fff" : "#ff6b6b"}
                strokeWidth="0.4"
              />
              <text
                x={p.x}
                y={p.y + 1}
                textAnchor="middle"
                fontSize={p.onField ? 2.8 : 2.3}
                fontWeight="700"
                fill="#fff"
                fontFamily="system-ui"
                style={{ pointerEvents: "none" }}

                <text
                  x={p.x}
                  y={p.y + 6}
                  textAnchor="middle"
                  fontSize="2.2"
                  fill="#fff"
                  fontFamily="system-ui"
                  style={{ pointerEvents: "none" }}

              )}
            </g>
          ))}
        </svg>
      </div>
    </div>
  );
}

/* ---------- Situation SVG (taktikdiagram) ---------- */
function SituationPitch({ variant, focusHalf }) {
  if (variant === "blackout") {
    const focus = focusHalf || "right";
    const leftFill = focus === "left" ? "#266b2a" : "#1b1b1b";
    const rightFill = focus === "right" ? "#266b2a" : "#1b1b1b";
    return (
      <g>
        <rect x="0" y="0" width="50" height="100" fill={leftFill} />
        <rect x="50" y="0" width="50" height="100" fill={rightFill} />
        <line x1="0" y1="50" x2="100" y2="50" stroke="#fff" strokeWidth="0.3" />
        <rect x="30" y="0" width="40" height="14" fill="none" stroke="#fff" strokeWidth="0.3" />
        <rect x="30" y="86" width="40" height="14" fill="none" stroke="#fff" strokeWidth="0.3" />
        <circle cx="50" cy="50" r="8" fill="none" stroke="#fff" strokeWidth="0.3" />
      </g>
    );
  }
  const stripes = [];
  for (let i = 0; i < 10; i++) {
    stripes.push(<rect key={i} x="0" y={i * 10} width="100" height="10" fill={i % 2 === 0 ? "#266b2a" : "#215e24"} />);
  }
  return (
    <g>
      {stripes}
      <rect x="0" y="0" width="100" height="100" fill="none" stroke="#fff" strokeWidth="0.3" />
      <line x1="0" y1="50" x2="100" y2="50" stroke="#fff" strokeWidth="0.3" />
      <circle cx="50" cy="50" r="8" fill="none" stroke="#fff" strokeWidth="0.3" />
      <rect x="30" y="0" width="40" height="14" fill="none" stroke="#fff" strokeWidth="0.3" />
      <rect x="30" y="86" width="40" height="14" fill="none" stroke="#fff" strokeWidth="0.3" />
      <rect x="40" y="0" width="20" height="5" fill="none" stroke="#fff" strokeWidth="0.3" />
      <rect x="40" y="95" width="20" height="5" fill="none" stroke="#fff" strokeWidth="0.3" />
    </g>
  );
}

function SituationSVG({ situation, roster, thumb }) {
  if (!situation) return null;
  const s = situation;
  const textSize = thumb ? 4 : 3.2;
  const labelSize = thumb ? 3 : 2.4;
  const playerR = thumb ? 3.6 : 3;
  const markerId = "sit-arrow-" + (thumb ? "t" : "b");

  return (
    <svg className={"sit-svg " + (thumb ? "is-thumb" : "")} viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id={markerId} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#eac54f" />
        </marker>
      </defs>
      <SituationPitch variant={s.variant || "green"} focusHalf={s.focusHalf} />
      {(s.zones || []).map((z, i) => (
        <rect key={"z" + i} x={z.x} y={z.y} width={z.w} height={z.h}
          fill="hsl(84 54% 45% / 0.22)" stroke="#eac54f" strokeWidth="0.3" strokeDasharray="1 0.8" />
      ))}
      {(s.arrows || []).map((a, i) => (
        <line key={"a" + i} x1={a.from[0]} y1={a.from[1]} x2={a.to[0]} y2={a.to[1]}
          stroke="#eac54f" strokeWidth="0.7"
          strokeDasharray={a.style === "dashed" ? "1.5 1" : undefined}
          markerEnd={"url(#" + markerId + ")"} />
      ))}
      {(s.players || []).map((pl, i) => {
        const r = roster.find(x => x.n === pl.n);
        return (
          <g key={"p" + i} transform={`translate(${pl.x} ${pl.y})`}>
            <circle r={playerR} fill={pl.highlight ? "#eac54f" : "#c9302c"} stroke="#fff" strokeWidth="0.4" />
            <text y={textSize * 0.35} fontSize={textSize} textAnchor="middle" fill={pl.highlight ? "#0b1220" : "#fff"} fontWeight="800">{pl.n}</text>
            {!thumb && r && (
              <g transform={`translate(0 ${playerR + 2})`}>
                <rect x={-7} y={-1.6} width={14} height={3.2} rx="0.6" fill="rgba(11,18,32,0.85)" />
                <text y={0.9} fontSize={labelSize} textAnchor="middle" fill="#fff" fontWeight="700">{r.name}</text>
              </g>
            )}
          </g>
        );
      })}
      {s.ball && (
        <circle cx={s.ball.x} cy={s.ball.y} r={thumb ? 1.4 : 1} fill="#fff" stroke="#0b1220" strokeWidth="0.3" />
      )}
    </svg>
  );
}

/* ---------- Situation Thumbs (filtrerad rad per sektion) ---------- */
function SituationThumbs({ sectionId, situations, roster, onOpen }) {
  if (!situations) return null;
  const entries = Object.entries(situations).filter(([, s]) => s.sectionId === sectionId);
  if (!entries.length) return null;
  return (
    <div className="sit-thumbs">
      {entries.map(([key, s]) => (
        <button key={key} className="sit-thumb" onClick={() => onOpen(s)} title={s.title} type="button">
          <div className="sit-thumb-svg">
            <SituationSVG situation={s} roster={roster} thumb />
          </div>
          <div className="sit-thumb-title">{s.title}</div>
        </button>
      ))}
    </div>
  );
}

/* ---------- Situation Lightbox (fullskärm) ---------- */
function SituationBench({ roster }) {
  const bench = roster.filter(p => p.n >= 12);
  if (!bench.length) return null;
  return (
    <div className="sit-bench">
      {bench.map(p => (
        <div key={p.n} className="sit-bench-pill">
          <span className="n">{p.n}</span>
          <span className="nm">{p.name}</span>
        </div>
      ))}
    </div>
  );
}

function SituationLightbox({ situation, roster, onClose }) {
  useEffect(() => {
    if (!situation) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [situation, onClose]);
  if (!situation) return null;
  return (
    <div className="sit-lightbox" onClick={onClose}>
      <div className="sit-lightbox-inner" onClick={e => e.stopPropagation()}>
        <button className="sit-lightbox-close" onClick={onClose} aria-label="Stäng" type="button">×</button>
        <div className="sit-lightbox-title">{situation.title}</div>
        {situation.subtitle && <div className="sit-lightbox-sub">{situation.subtitle}</div>}
        <div className="sit-lightbox-svg">
          <SituationSVG situation={situation} roster={roster} />
        </div>
        {situation.bench && <SituationBench roster={roster} />}
      </div>
    </div>
  );
}

Object.assign(window, { Eyebrow, EditableLine, EditableText, Principles, Bullets, Pitch, Roster, TacticBoard, TacticBoardLightbox, SituationSVG, SituationPitch, SituationThumbs, SituationLightbox, SituationBench });

</script>

function _TaktikHalfLines() {

  const gaTL = window.halfM(P.length, P.gaNear);
  const gaBR = window.halfM(P.length - P.gaDepth, P.gaFar);

            fontFamily="Inter, sans-serif" fontWeight="500" fontSize="13" fill={stroke} opacity="0.85">{sub}</text>
    </g>
  );
  return (
    <svg viewBox={`0 0 ${V.width} ${V.height}`} xmlns="http://www.w3.org/2000/svg" style={TK_SVG_STYLE}>

      {space(x1, x2, "hsl(47 78% 56% / 0.15)",  "hsl(47 80% 70%)",  "SPELYTA 1",  "Spela in")}
      {space(x2, x3, "hsl(47 78% 56% / 0.22)",  "hsl(47 80% 70%)",  "SPELYTA 2",  "Ta dig framåt")}
      {space(x3, x4, "hsl(47 78% 56% / 0.32)",  TK_COLORS.gold,     "SPELYTA 3",  "Fyll på i box")}
      <line x1={30} y1={40} x2={V.width - 50} y2={40}
            stroke={TK_COLORS.gold} strokeWidth="4" markerEnd="url(#tk-arrG-sp)" />
      <text x={V.width / 2} y={28} textAnchor="middle"
            fontFamily="Inter, sans-serif" fontWeight="900" fontSize="15" fill={TK_COLORS.gold} letterSpacing="3">ANFALLSVÄG →</text>
    </svg>
  );
}

/* ---------- Stubs som fylls på i senare tasks ---------- */
/* Översätter en dot till en visningsetikett.
 * team:"us" + n:N → slå upp i MP_DATA.roster, visa nummer som default (eller initialer / nummer+namn
 *   styrs av labelMode-parametern).
 * team:"them" eller saknar n → använd dot.label direkt. */
function _taktikLabelFor(dot, roster, labelMode) {
  if (dot.team !== "us" || dot.n == null) {
    return dot.label != null ? String(dot.label) : "";
  }
  const player = roster && roster.find(p => p.n === dot.n);
  if (!player) return String(dot.n);
  if (labelMode === "initials") {
    const parts = (player.name || "").trim().split(/\s+/);
    const first = parts[0] ? parts[0][0].toUpperCase() : "";
    const second = parts[1] ? parts[1][0].toUpperCase() : "";
    return (first + second) || String(dot.n);
  }
  if (labelMode === "numberName") {
    const first = (player.name || "").trim().split(/\s+/)[0] || "";
    return first ? `${dot.n} ${first}` : String(dot.n);
  }
  return String(dot.n);
}

/* TaktikHalv — stående halvplan, ritar zones + pilar + spelare från meter-koord.
 * Props:
 *  - id: string (unikt per instans för defs)
 *  - title: string (rubrikband)
 *  - dots, arrows, zones: från MP_TAKTIK-posten
 *  - roster: MP_DATA.roster-arrayen (för namn-uppslag)
 *  - labelMode: "number" | "initials" | "numberName" (default "number") */
function TaktikHalv({ id, title, dots, arrows, zones, roster, labelMode }) {
  const V = window.MP_HALF_VB;
  const mode = labelMode || "number";
  return (
    <svg viewBox={`0 0 ${V.width} ${V.height}`} xmlns="http://www.w3.org/2000/svg" style={TK_SVG_STYLE}>
      <_TaktikPitchDefs id={id} />
      <rect width={V.width} height={V.height} fill={`url(#tk-mow-${id})`} />
      {zones && zones.map((z, i) => {
        const tl = window.halfM(z.xMax, z.yMin);
        const br = window.halfM(z.xMin, z.yMax);
        const cx = (tl.x + br.x) / 2;
        const cy = (tl.y + br.y) / 2;
        return (
          <g key={`z-${i}`}>
            <rect x={tl.x} y={tl.y} width={br.x - tl.x} height={br.y - tl.y}
                  fill={z.fill} stroke={z.stroke || "none"} strokeWidth="1.5" strokeDasharray="5 4" />
            {z.label && (
              <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                    fontFamily="Inter, sans-serif" fontWeight="800" fontSize="12"
                    fill={z.labelColor || TK_COLORS.white} letterSpacing="1">{z.label}</text>
            )}
          </g>
        );
      })}
      <_TaktikHalfLines />
      {arrows && arrows.map((a, i) => {
        const f = window.halfM(a.from.xM, a.from.yM);
        const t = window.halfM(a.to.xM,   a.to.yM);
        const color = a.kind === "ball" ? TK_COLORS.white : a.kind === "pass" ? "hsl(50 95% 60%)" : TK_COLORS.gold;
        const marker = a.kind === "ball" ? `url(#tk-arrW-${id})` : `url(#tk-arrG-${id})`;
        const dash = a.kind === "run" ? "8 5" : a.kind === "pass" ? "10 4" : null;
        if (a.curve) {
          const mx = (f.x + t.x) / 2;
          const my = (f.y + t.y) / 2;
          const dx = t.x - f.x, dy = t.y - f.y;
          const len = Math.hypot(dx, dy) || 1;
          const ox = -dy / len * a.curve;
          const oy =  dx / len * a.curve;
          return (
            <path key={`a-${i}`} d={`M ${f.x} ${f.y} Q ${mx + ox} ${my + oy} ${t.x} ${t.y}`}
                  fill="none" stroke={color} strokeWidth="3" strokeLinecap="round"
                  strokeDasharray={dash || undefined} markerEnd={marker} />
          );
        }
        return (
          <line key={`a-${i}`} x1={f.x} y1={f.y} x2={t.x} y2={t.y}
                stroke={color} strokeWidth="3" strokeLinecap="round"
                strokeDasharray={dash || undefined} markerEnd={marker} />
        );
      })}
      {dots && dots.map((d, i) => {
        const p = window.halfM(d.xM, d.yM);
        return (
          <_TaktikDot key={d.id || `d-${i}`} x={p.x} y={p.y} r={d.r}
            label={_taktikLabelFor(d, roster, mode)} team={d.team || "us"} />
        );
      })}
      {title && (
        <g>
          <rect x={V.width / 2 - 170} y={V.height - 54} width={340} height={34} rx="3" fill={TK_COLORS.panelBg} />
          <text x={V.width / 2} y={V.height - 32} textAnchor="middle"
                fontFamily="Inter, sans-serif" fontWeight="900" fontSize="16" fill={TK_COLORS.gold} letterSpacing="1.8">
            {title.toUpperCase()}
          </text>
        </g>
      )}
    </svg>
  );
}

/* TaktikBilderThumbs — renderar alla MP_TAKTIK-poster vars sectionId matchar
 * som små klickbara mini-SVG:er. Klick → onOpen(taktikKey). */
function TaktikBilderThumbs({ sectionId, taktik, roster, onOpen }) {
  const keys = Object.keys(taktik || {}).filter(k => taktik[k].sectionId === sectionId);
  if (keys.length === 0) return null;
  return (
    <div className="tk-thumbs-grid">
      {keys.map(k => {
        const t = taktik[k];
        return (
          <button key={k} type="button" className="tk-thumb" onClick={() => onOpen(k)}
            title={`Öppna ${t.title}`}>
            <TaktikHalv id={`thumb-${k}`} title={t.title} dots={t.dots}
              arrows={t.arrows} zones={t.zones} roster={roster} labelMode="number" />
            <div className="tk-thumb-caption">{t.title}</div>
          </button>
        );
      })}
    </div>

}
function TaktikLightbox({ taktikKey, roster, onClose }) {
  const t = window.MP_TAKTIK && window.MP_TAKTIK[taktikKey];
  const svgRef = useRef(null);
  const [dots, setDots] = useState(() => t ? t.dots.map(d => ({ ...d })) : []);
  const [dragId, setDragId] = useState(null);
  const [toolMode, setToolMode] = useState("move"); // "move" | "arrow"
  const [userArrows, setUserArrows] = useState([]);  // { from:{xM,yM}, to:{xM,yM} }
  const [arrowDraft, setArrowDraft] = useState(null); // { from:{xM,yM}, to:{xM,yM} } under drag

  // Escape-stäng
  useEffect(() => {
    if (!t) return;
    const handler = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [t, onClose]);

  // Reset-funktion — återställ till default
  const resetAll = () => {
    if (!t) return;
    setDots(t.dots.map(d => ({ ...d })));
    setUserArrows([]);
    setArrowDraft(null);
    setToolMode("move");
  };

  // Hjälpare: konvertera skärm-pixel till SVG-koord
  const screenToSvg = (clientX, clientY) => {
    const svg = svgRef.current;
    if (!svg) return null;
    const pt = svg.createSVGPoint();
    pt.x = clientX;
    pt.y = clientY;
    const ctm = svg.getScreenCTM();
    if (!ctm) return null;
    const svgPt = pt.matrixTransform(ctm.inverse());
    return { x: svgPt.x, y: svgPt.y };
  };

  // Pointer event handlers — drag-logik
  const onPointerDown = (dotId) => (e) => {
    e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    setDragId(dotId);
  };
  const onPointerMove = (e) => {
    if (dragId == null) return;
    const svgPt = screenToSvg(e.clientX, e.clientY);
    if (!svgPt) return;
    const scale = window.MP_HALF_VB.scale;
    // svg-x → yM (bredd), svg-y → xM (djup, 52.5..105)
    const yM = svgPt.x / scale;
    const xM = 105 - svgPt.y / scale;
    // Clamp till motståndarhalvan
    const clampedXM = Math.max(52.5, Math.min(105, xM));
    const clampedYM = Math.max(0, Math.min(68, yM));
    setDots(prev => prev.map(d => d.id === dragId
      ? { ...d, xM: clampedXM, yM: clampedYM }
      : d));
  };
  const onPointerUp = (e) => {
    if (dragId == null) return;
    try { e.target.releasePointerCapture(e.pointerId); } catch (_) { /* ignore */ }
    setDragId(null);
  };

  // Skärm-punkt till meter-koord (djup, bredd)
  const screenToMeters = (clientX, clientY) => {
    const svgPt = screenToSvg(clientX, clientY);
    if (!svgPt) return null;
    const scale = window.MP_HALF_VB.scale;
    const yM = Math.max(0, Math.min(68, svgPt.x / scale));
    const xM = Math.max(52.5, Math.min(105, 105 - svgPt.y / scale));
    return { xM, yM };
  };

  // Pil-drag: onPointerDown på SVG-bakgrund
  const onArrowStart = (e) => {
    if (toolMode !== "arrow") return;
    if (e.target !== svgRef.current && e.target.tagName !== "rect") return;
    // bakgrunden är första <rect>; om event-target är en dot hoppar vi ur (dot-handlers har stopPropagation)
    const m = screenToMeters(e.clientX, e.clientY);
    if (!m) return;
    try { svgRef.current.setPointerCapture(e.pointerId); } catch (_) {}
    setArrowDraft({ from: m, to: m });
  };

  const onArrowMove = (e) => {
    if (toolMode !== "arrow" || !arrowDraft) return;
    const m = screenToMeters(e.clientX, e.clientY);
    if (!m) return;
    setArrowDraft({ from: arrowDraft.from, to: m });
  };

  const onArrowEnd = (e) => {
    if (toolMode !== "arrow" || !arrowDraft) return;
    try { svgRef.current.releasePointerCapture(e.pointerId); } catch (_) {}
    // Minsta avstånd för att registrera (undvik oavsiktliga klick-pilar)
    const dx = arrowDraft.to.xM - arrowDraft.from.xM;
    const dy = arrowDraft.to.yM - arrowDraft.from.yM;
    if (Math.hypot(dx, dy) > 1.5) {
      setUserArrows(prev => [...prev, arrowDraft]);
    }
    setArrowDraft(null);
  };

  const clearUserArrows = () => {
    setUserArrows([]);
    setArrowDraft(null);
  };

  if (!t) return null;

  const V = window.MP_HALF_VB;
  const lbId = `lb-${taktikKey}`;

  return (
    <div className="tk-lightbox" onClick={onClose}>
      <div className="tk-lightbox-inner" onClick={e => e.stopPropagation()}>
        <button className="tk-close-btn" onClick={onClose} type="button" aria-label="Stäng">×</button>
        <div className="tk-toolbar">
          <button className={`tk-tool-btn${toolMode === "move" ? " is-active" : ""}`} type="button"
                  onClick={() => setToolMode("move")}>Flytta</button>
          <button className={`tk-tool-btn${toolMode === "arrow" ? " is-active" : ""}`} type="button"
                  onClick={() => setToolMode("arrow")}>Rita pil</button>
          <button className="tk-tool-btn" type="button" onClick={clearUserArrows}>Rensa pilar</button>
          <button className="tk-tool-btn" type="button" onClick={resetAll}>Återställ</button>
        </div>
        <div className="tk-svg-wrap">
          <svg ref={svgRef}
               viewBox={`0 0 ${V.width} ${V.height}`}
               xmlns="http://www.w3.org/2000/svg"
               style={{ ...TK_SVG_STYLE, touchAction: "none" }}
               onPointerDown={onArrowStart}
               onPointerMove={(e) => { onPointerMove(e); onArrowMove(e); }}
               onPointerUp={(e) => { onPointerUp(e); onArrowEnd(e); }}
               onPointerCancel={(e) => { onPointerUp(e); onArrowEnd(e); }}>
            <_TaktikPitchDefs id={lbId} />
            <rect width={V.width} height={V.height} fill={`url(#tk-mow-${lbId})`} />
            {t.zones && t.zones.map((z, i) => {
              const tl = window.halfM(z.xMax, z.yMin);
              const br = window.halfM(z.xMin, z.yMax);
              const cx = (tl.x + br.x) / 2;
              const cy = (tl.y + br.y) / 2;
              return (
                <g key={`z-${i}`}>
                  <rect x={tl.x} y={tl.y} width={br.x - tl.x} height={br.y - tl.y}
                        fill={z.fill} stroke={z.stroke || "none"} strokeWidth="1.5" strokeDasharray="5 4" />
                  {z.label && (
                    <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                          fontFamily="Inter, sans-serif" fontWeight="800" fontSize="12"
                          fill={z.labelColor || TK_COLORS.white} letterSpacing="1">{z.label}</text>
                  )}
                </g>
              );
            })}
            <_TaktikHalfLines />
            {t.arrows && t.arrows.map((a, i) => {
              const f = window.halfM(a.from.xM, a.from.yM);
              const tp = window.halfM(a.to.xM, a.to.yM);
              const color = a.kind === "ball" ? TK_COLORS.white : a.kind === "pass" ? "hsl(50 95% 60%)" : TK_COLORS.gold;
              const marker = a.kind === "ball" ? `url(#tk-arrW-${lbId})` : `url(#tk-arrG-${lbId})`;
              const dash = a.kind === "run" ? "8 5" : a.kind === "pass" ? "10 4" : null;
              if (a.curve) {
                const mx = (f.x + tp.x) / 2;
                const my = (f.y + tp.y) / 2;
                const dx = tp.x - f.x, dy = tp.y - f.y;
                const len = Math.hypot(dx, dy) || 1;
                const ox = -dy / len * a.curve;
                const oy =  dx / len * a.curve;
                return (
                  <path key={`a-${i}`} d={`M ${f.x} ${f.y} Q ${mx + ox} ${my + oy} ${tp.x} ${tp.y}`}
                        fill="none" stroke={color} strokeWidth="3" strokeLinecap="round"
                        strokeDasharray={dash || undefined} markerEnd={marker} />
                );
              }
              return (
                <line key={`a-${i}`} x1={f.x} y1={f.y} x2={tp.x} y2={tp.y}
                      stroke={color} strokeWidth="3" strokeLinecap="round"
                      strokeDasharray={dash || undefined} markerEnd={marker} />
              );
            })}
            {userArrows.map((a, i) => {
              const f = window.halfM(a.from.xM, a.from.yM);
              const tp = window.halfM(a.to.xM, a.to.yM);
              return (
                <line key={`ua-${i}`} x1={f.x} y1={f.y} x2={tp.x} y2={tp.y}
                      stroke={TK_COLORS.gold} strokeWidth="3" strokeLinecap="round"
                      markerEnd={`url(#tk-arrG-${lbId})`} />
              );
            })}
            {arrowDraft && (() => {
              const f = window.halfM(arrowDraft.from.xM, arrowDraft.from.yM);
              const tp = window.halfM(arrowDraft.to.xM, arrowDraft.to.yM);
              return (
                <line x1={f.x} y1={f.y} x2={tp.x} y2={tp.y}
                      stroke={TK_COLORS.goldBright} strokeWidth="2" strokeLinecap="round"
                      strokeDasharray="6 4" opacity="0.8" />
              );
            })()}
            {dots.map((d, i) => {
              const p = window.halfM(d.xM, d.yM);
              const r = d.r != null ? d.r : 20;
              const label = _taktikLabelFor(d, roster, "number");
              const fill = d.team === "them" ? TK_COLORS.blue : d.team === "ref" ? "hsl(215 25% 30%)" : TK_COLORS.gold;
              const stroke = d.team === "us" ? TK_COLORS.goldBright : "hsl(0 0% 100% / 0.6)";
              const color = d.team === "us" ? TK_COLORS.goldTxt : TK_COLORS.white;
              const fs = String(label).length > 2 ? r * 0.7 : r * 0.95;
              return (
                <g key={d.id || `d-${i}`}
                   style={{ cursor: "grab", touchAction: "none" }}
                   onPointerDown={toolMode === "move" ? onPointerDown(d.id) : undefined}>
                  <circle cx={p.x} cy={p.y} r={r} fill={fill} stroke={stroke} strokeWidth="2" />
                  <text x={p.x} y={p.y} textAnchor="middle" dominantBaseline="central"
                        fontFamily="Inter, sans-serif" fontWeight="900" fontSize={fs} fill={color}
                        style={{ pointerEvents: "none", userSelect: "none" }}>
                    {label}
                  </text>
                </g>
              );
            })}
            <rect x={V.width / 2 - 170} y={V.height - 54} width={340} height={34} rx="3" fill={TK_COLORS.panelBg} />
            <text x={V.width / 2} y={V.height - 32} textAnchor="middle"
                  fontFamily="Inter, sans-serif" fontWeight="900" fontSize="16" fill={TK_COLORS.gold} letterSpacing="1.8">
              {t.title.toUpperCase()}
            </text>
          </svg>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  ZonerBox, Korridorer, Spelytor,
  TaktikHalv, TaktikBilderThumbs, TaktikLightbox,
});

      sectionId="ovrigt" onOpen={onOpen} roster={roster}>
      <div className="role-grid">
        {state.map((r, i) => (
          <div key={i} className="role-row">
            <div className="k">{r.k}</div>
            <EditableLine small value={r.v}
              onChange={v => set(state.map((x, idx) => idx === i ? { ...x, v } : x))} />
          </div>
        ))}
      </div>
    </SectionCard>
  );
}

/* Press triggers (side panel) */
function PressPanel({ state, set }) {
  const add = () => set([...state, { trigger: "", action: "" }]);
  return (
    <div className="card">
      <div className="card-head"><span className="num">TRG</span><span className="lbl">Press-triggers</span></div>
      <div className="card-body">
        {state.map((t, i) => (
          <div key={i} className="trigger">
            <EditableText value={t.trigger} onChange={v => set(state.map((x, idx) => idx === i ? { ...x, trigger: v } : x))} placeholder="Trigger..." />
            <EditableText value={t.action} onChange={v => set(state.map((x, idx) => idx === i ? { ...x, action: v } : x))} placeholder="Vad vi gör..." />
          </div>
        ))}
        <div className="add-row" onClick={add}><span className="plus">+</span> Lägg till trigger</div>
      </div>
    </div>
  );
}

/* Uppbyggnad */
function UppbyggnadPanel({ state, set }) {
  return (
    <div className="card">
      <div className="card-head"><span className="num">SPU</span><span className="lbl">Speluppbyggnad</span></div>
      <div className="card-body">
        <div className="stacklist">
          {state.map((r, i) => (
            <div key={i} className="item">
              <div className="k">{r.phase}</div>
              <div className="v">
                <div style={{fontWeight:700, color:"var(--fg)", marginBottom:2}}>{r.who}</div>
                <EditableText value={r.what} onChange={v => set(state.map((x, idx) => idx === i ? { ...x, what: v } : x))} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* Matchmål */
function MatchmalPanel({ state, set }) {
  return (
    <div className="card">
      <div className="card-head"><span className="num">MÅL</span><span className="lbl">Nyckelpunkter & matchmål</span></div>
      <div className="card-body">
        <Bullets items={state} onChange={set} />
      </div>
    </div>
  );
}

Object.assign(window, {
  SectionCard, SecForutsattningar, SecIdentitet, SecForsvar, SecOmstAnfall,
  SecAnfall, SecOmstForsvar, SecFastaForsvar, SecFastaAnfall, SecOvrigt,
  PressPanel, UppbyggnadPanel, MatchmalPanel
});

</script>
<script type="text/babel" data-presets="react">
// Matchplan — main App (Variant A: Flow, Variant B: Grid)
const { useState: useStateA, useMemo } = React;

function App() {
  const [variant, setVariant] = useStateA("A");

  // State for editable bits
  const [roster, setRoster] = useStateA(MP_DATA.roster);
  const [assignments, setAssignments] = useStateA(MP_DATA.formation433.startingXI || {}); // pos.id -> player.n

  const [matchmal, setMatchmal] = useStateA(MP_DATA.matchmal);
  const [forutsattningar, setForutsattningar] = useStateA(MP_COHERENCE[0].bullets);
  const [roles, setRoles] = useStateA(MP_COHERENCE[8].roles);
  const [press, setPress] = useStateA(MP_PRESS);
  const [uppbyggnad, setUppbyggnad] = useStateA(MP_UPPBYGGNAD);
  const [activeSituation, setActiveSituation] = useStateA(null);
  const [tacticBoardOpen, setTacticBoardOpen] = useStateA(false);
  const [taktikOpen, setTaktikOpen] = useStateA(null); // taktikKey eller null

  const used = useMemo(() => new Set(Object.values(assignments)), [assignments]);
  const assign = (posId, num) => setAssignments(prev => {
    // remove num from any other pos first
    const next = {};
    for (const [k, v] of Object.entries(prev)) if (v !== num) next[k] = v;
    next[posId] = num;
    return next;
  });
  const clear = (posId) => setAssignments(prev => {
    const next = { ...prev }; delete next[posId]; return next;
  });

  const m = MP_DATA.match;

  return (
    <>
      <div className="app-bg" aria-hidden="true" />
      <header className="topbar">
        <div className="topbar-inner">
          <div className="brand">
            <div className="brand-badge">G</div>
            <div className="brand-name">Matchplaner<span className="yr">2026</span></div>
          </div>
          <div className="match-meta">
            <div>
              <div className="vs">{m.home ? "Hemma" : "Borta"} · Matchplan</div>
              <h1>Gunnilse IS <span className="muted" style={{fontWeight:500}}>vs</span> <span className="opp">{m.opponent}</span></h1>
              <div className="dots">
                <span>{m.kickoff}</span>
                <span>{m.venue}</span>
                <span>4-3-3</span>
              </div>
            </div>
          </div>
          <div className="variant-toggle">
            <button className={variant === "A" ? "is-active" : ""} onClick={() => setVariant("A")}>Flöde</button>
            <button className={variant === "B" ? "is-active" : ""} onClick={() => setVariant("B")}>Matchblad</button>
          </div>
        </div>
      </header>

      <main className="page">
        {variant === "A" ? (
          <VariantA
            {...{ roster, setRoster, assignments, assign, clear, used,
              matchmal, setMatchmal, forutsattningar, setForutsattningar,
              roles, setRoles, press, setPress, uppbyggnad, setUppbyggnad,
              onOpen: setActiveSituation,
              onOpenTacticBoard: () => setTacticBoardOpen(true),
              onOpenTaktik: setTaktikOpen }}
          />
        ) : (
          <VariantB
            {...{ roster, setRoster, assignments, assign, clear, used,
              matchmal, setMatchmal, forutsattningar, setForutsattningar,
              roles, setRoles, press, setPress, uppbyggnad, setUppbyggnad,
              onOpen: setActiveSituation,
              onOpenTacticBoard: () => setTacticBoardOpen(true),
              onOpenTaktik: setTaktikOpen }}
          />
        )}
      </main>
      <SituationLightbox situation={activeSituation} roster={roster} onClose={() => setActiveSituation(null)} />
      <TacticBoardLightbox
        open={tacticBoardOpen}
        onClose={() => setTacticBoardOpen(false)}
        roster={roster}
        assignments={assignments}
      />
      {taktikOpen && (
        <TaktikLightbox taktikKey={taktikOpen} roster={roster}
          onClose={() => setTaktikOpen(null)} />
      )}
    </>
  );
}

function VariantA(p) {
  return (
    <div className="flow">
      <div className="flow-main">
        <SecForutsattningar state={p.forutsattningar} set={p.setForutsattningar} onOpen={p.onOpen} roster={p.roster} />
        <SecIdentitet onOpen={p.onOpen} roster={p.roster} />
        <SecForsvar onOpen={p.onOpen} roster={p.roster} />
        <SecOmstAnfall onOpen={p.onOpen} roster={p.roster} />
        <SecAnfall onOpen={p.onOpen} roster={p.roster} />
        <SecOmstForsvar onOpen={p.onOpen} roster={p.roster} />
        <SecFastaForsvar onOpen={p.onOpen} onOpenTaktik={p.onOpenTaktik} roster={p.roster} />
        <SecFastaAnfall onOpen={p.onOpen} onOpenTaktik={p.onOpenTaktik} roster={p.roster} />
        <SecOvrigt state={p.roles} set={p.setRoles} onOpen={p.onOpen} roster={p.roster} />
      </div>
      <aside className="flow-side">
        <div className="card">
          <div className="card-head"><span className="num">XI</span><span className="lbl">Startelva — 4-3-3</span></div>
          <div className="card-body">
            <Pitch assignments={p.assignments} onAssign={p.assign} onClear={p.clear} roster={p.roster} />
            <div className="hint-inline">Dra spelare från truppen → klicka på en cirkel för att ta bort.</div>
          </div>
        </div>
        <div className="card">
          <div className="card-head"><span className="num">TAK</span><span className="lbl">Taktiktavla</span></div>
          <div className="card-body"><TacticBoard onOpen={p.onOpenTacticBoard} /></div>
        </div>
        <div className="card">
          <div className="card-body"><Roster roster={p.roster} setRoster={p.setRoster} used={p.used} /></div>
        </div>
        <MatchmalPanel state={p.matchmal} set={p.setMatchmal} />
        <PressPanel state={p.press} set={p.setPress} />
        <UppbyggnadPanel state={p.uppbyggnad} set={p.setUppbyggnad} />
      </aside>
    </div>
  );
}

function VariantB(p) {
  return (
    <div className="grid-b">
      <div className="col">
        <div className="card">
          <div className="card-head"><span className="num">XI</span><span className="lbl">Startelva — 4-3-3</span></div>
          <div className="card-body">
            <Pitch assignments={p.assignments} onAssign={p.assign} onClear={p.clear} roster={p.roster} />
          </div>
        </div>
        <div className="card">
          <div className="card-head"><span className="num">TAK</span><span className="lbl">Taktiktavla</span></div>
          <div className="card-body"><TacticBoard onOpen={p.onOpenTacticBoard} /></div>
        </div>
        <div className="card">
          <div className="card-body"><Roster roster={p.roster} setRoster={p.setRoster} used={p.used} /></div>
        </div>
      </div>
      <div className="col">
        <MatchmalPanel state={p.matchmal} set={p.setMatchmal} />
        <CompactCard num="01" title="Förutsättningar" sectionId="forutsattningar" onOpen={p.onOpen} roster={p.roster}>
          <Bullets items={p.forutsattningar} onChange={p.setForutsattningar} />
        </CompactCard>
        <CompactCard num="02" title="Identitet" sectionId="identitet" onOpen={p.onOpen} roster={p.roster}>
          <Principles items={MP_COHERENCE[1].principles} />
        </CompactCard>
        <CompactCard num="03" title="Försvarsspel" sectionId="forsvar" onOpen={p.onOpen} roster={p.roster}>
          <Principles items={MP_COHERENCE[2].principles} />
        </CompactCard>
        <CompactCard num="05" title="Anfallsspel" sectionId="anfall" onOpen={p.onOpen} roster={p.roster}>
          <Principles items={MP_COHERENCE[4].principles} />
        </CompactCard>
      </div>
      <div className="col">
        <CompactCard num="04" title="Omst → anfall" sectionId="omst-anfall" onOpen={p.onOpen} roster={p.roster}>
          <Principles items={MP_COHERENCE[3].principles} />
        </CompactCard>
        <CompactCard num="06" title="Omst → försvar" sectionId="omst-forsvar" onOpen={p.onOpen} roster={p.roster}>
          <Principles items={MP_COHERENCE[5].principles} />
        </CompactCard>
        <CompactCard num="07" title="Fasta — försvar" sectionId="fasta-forsvar" onOpen={p.onOpen} roster={p.roster}>
          <Principles items={MP_COHERENCE[6].principles} />
          <div className="sec-note">{MP_COHERENCE[6].note}</div>
        </CompactCard>
        <CompactCard num="08" title="Fasta — anfall" sectionId="fasta-anfall" onOpen={p.onOpen} roster={p.roster}>
          <div className="sec-note">{MP_COHERENCE[7].note}</div>
        </CompactCard>
        <PressPanel state={p.press} set={p.setPress} />
        <UppbyggnadPanel state={p.uppbyggnad} set={p.setUppbyggnad} />
        <CompactCard num="09" title="Övriga roller" sectionId="ovrigt" onOpen={p.onOpen} roster={p.roster}>
          <div style={{display:"flex", flexDirection:"column", gap:6}}>
            {p.roles.map((r, i) => (
              <div key={i} className="role-row">
                <div className="k">{r.k}</div>
                <EditableLine small value={r.v}
                  onChange={v => p.setRoles(p.roles.map((x, idx) => idx === i ? { ...x, v } : x))} />
              </div>
            ))}
          </div>
        </CompactCard>
      </div>
    </div>
  );
}

function CompactCard({ num, title, children, sectionId, onOpen, roster }) {
  return (
    <div className="card">
      <div className="card-head"><span className="num">{num}</span><span className="lbl">{title}</span></div>
      <div className="card-body">
        {children}
        {sectionId && onOpen && (
          <SituationThumbs sectionId={sectionId} situations={window.MP_SITUATIONS} roster={roster} onOpen={onOpen} />
        )}
      </div>
    </div>
  );
}

Object.assign(window, { App, VariantA, VariantB, CompactCard });
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
